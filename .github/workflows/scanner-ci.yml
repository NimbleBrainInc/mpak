name: Scanner CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/scanner/**'
      - '.github/workflows/scanner-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/scanner/**'
      - '.github/workflows/scanner-ci.yml'

concurrency:
  group: scanner-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/scanner
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0  # setup-uv dropped floating major tags (v8+); pin exact
        with:
          enable-cache: false  # no uv cache: v9 defaults to 'auto', and unpruned caching would eat the shared 10 GB Actions budget

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run ty check src/

      - name: Run tests
        run: uv run pytest
