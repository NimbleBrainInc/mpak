name: Publish Schemas

on:
  push:
    tags:
      - 'schemas-v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nimblebrain/mpak-schemas build
      - run: pnpm lint
      - run: pnpm --filter @nimblebrain/mpak-schemas typecheck
      - run: pnpm --filter @nimblebrain/mpak-schemas test

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/schemas-v}"
          PKG_VERSION=$(node -e "console.log(require('./packages/schemas/package.json').version)")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build
        run: pnpm --filter @nimblebrain/mpak-schemas build

      - name: Publish to npm
        run: |
          # The tag is the source of truth; publishing is idempotent so a re-pushed
          # or backfilled tag won't fail on an already-published version.
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER already on npm — skipping publish (Release still created)"
          else
            # pnpm pack resolves workspace:* to real versions; npm publish keeps provenance
            pnpm pack
            npm publish nimblebrain-mpak-schemas-*.tgz --provenance --access public
          fi
        working-directory: packages/schemas

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history + tags so we can find the previous same-prefix tag
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#schemas-v}"
          # Find the previous same-prefix tag so notes don't include sibling-package commits
          PREV_TAG=$(git tag -l 'schemas-v*' --sort=-v:refname | grep -v "^${TAG}$" | head -n1)
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping create"
          else
            gh release create "$TAG" \
              --title "@nimblebrain/mpak-schemas v$VERSION" \
              --generate-notes \
              ${PREV_TAG:+--notes-start-tag "$PREV_TAG"} \
              --verify-tag
          fi
