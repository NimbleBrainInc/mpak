name: TypeScript SDK CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/sdk-typescript/**'
      - '.github/workflows/sdk-typescript-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/sdk-typescript/**'
      - '.github/workflows/sdk-typescript-ci.yml'

concurrency:
  group: sdk-typescript-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @nimblebrain/mpak-sdk... build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm --filter @nimblebrain/mpak-sdk typecheck

      - name: Test
        run: pnpm --filter @nimblebrain/mpak-sdk test
