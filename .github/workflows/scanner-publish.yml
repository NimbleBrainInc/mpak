name: Publish Scanner

on:
  push:
    tags:
      - 'scanner-v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nimblebraininc/mpak-scanner

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/scanner
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v9.0.0  # setup-uv dropped floating major tags (v8+); pin exact
        with:
          enable-cache: false  # no uv cache: v9 defaults to 'auto', and unpruned caching would eat the shared 10 GB Actions budget
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run ty check src/
      - run: uv run pytest -m "not e2e"

  publish-pypi:
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: apps/scanner
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v9.0.0  # setup-uv dropped floating major tags (v8+); pin exact
        with:
          enable-cache: false  # no uv cache: v9 defaults to 'auto', and unpruned caching would eat the shared 10 GB Actions budget

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/scanner-v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: apps/scanner/dist/
          # Idempotent: a re-pushed/backfilled tag skips an already-published
          # version instead of failing; the Release job still runs.
          skip-existing: true

  publish-docker:
    needs: [verify, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/scanner-v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: apps/scanner
          file: apps/scanner/Dockerfile
          push: true
          build-args: |
            SCANNER_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  release:
    needs: publish-docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history + tags so we can find the previous same-prefix tag
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#scanner-v}"
          # Find the previous same-prefix tag so notes don't include sibling-package commits
          PREV_TAG=$(git tag -l 'scanner-v*' --sort=-v:refname | grep -v "^${TAG}$" | head -n1)
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping create"
          else
            gh release create "$TAG" \
              --title "mpak-scanner v$VERSION" \
              --generate-notes \
              ${PREV_TAG:+--notes-start-tag "$PREV_TAG"} \
              --verify-tag
          fi
